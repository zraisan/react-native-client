name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint-ci

      - name: Package dry-run
        run: npm pack --dry-run

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Validate podspec
        run: pod lib lint NitroClient.podspec --allow-warnings
